# compose.ci.yml - Docker Compose สำหรับ CI Testing โดยเฉพาะ (แยกจาก dev)
services:
  laravel.test:
    build:
      context: .
      dockerfile: Dockerfile.ci
    environment:
      APP_ENV: testing
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: laravel
      DB_USERNAME: sail
      DB_PASSWORD: password
    networks:
      - ci

  api_dotnet:
    build:
      context: ./Api
      dockerfile: Dockerfile
    networks:
      - ci

  mysql:
    image: 'mysql:8.0'
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: laravel
      MYSQL_USER: sail
      MYSQL_PASSWORD: password
    networks:
      - ci

networks:
  ci:
    driver: bridge
