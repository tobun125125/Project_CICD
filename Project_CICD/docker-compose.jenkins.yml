services:
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile.jenkins
    container_name: jenkins
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "50000:50000"
    user: root
    volumes:
      - jenkins_home:/var/jenkins_home
      # Mount Docker socket so Jenkins can run Docker commands (DinD)
      - /var/run/docker.sock:/var/run/docker.sock


volumes:
  jenkins_home:
    driver: local
