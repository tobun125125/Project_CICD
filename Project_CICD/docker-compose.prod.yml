version: '3.8'

services:
  # Laravel PHP Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - .:/var/www
    networks:
      - prod-network

  # Nginx Web Server (คอยรับ Request ให้ Laravel)
  web:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - prod-network

  # MySQL Database
  db:
      image: 'mysql:8.4'
      ports:
          - '3306:3306'
      environment:
          MYSQL_ROOT_PASSWORD: '${DB_PASSWORD}'
          MYSQL_DATABASE: '${DB_DATABASE}'
          MYSQL_USER: '${DB_USERNAME}'
          MYSQL_PASSWORD: '${DB_PASSWORD}'
          MYSQL_ALLOW_EMPTY_PASSWORD: 1
      volumes:
          - 'prod-mysql:/var/lib/mysql'
      networks:
          - prod-network

  # .NET API Service
  api_dotnet:
    build:
      context: ./Api
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - prod-network

networks:
  prod-network:
    driver: bridge

volumes:
    prod-mysql:
        driver: local
