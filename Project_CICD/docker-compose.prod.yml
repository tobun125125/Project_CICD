services:
  # Laravel PHP Application (โค้ด COPY อยู่ใน image แล้ว ไม่ต้อง mount)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - prod-network

  # Nginx Web Server (COPY config เข้า image แทน volume mount)
  web:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - app
    networks:
      - prod-network

  # MySQL Database
  db:
      image: 'mysql:8.4'
      environment:
          MYSQL_ROOT_PASSWORD: '${DB_PASSWORD}'
          MYSQL_DATABASE: '${DB_DATABASE}'
          MYSQL_USER: '${DB_USERNAME}'
          MYSQL_PASSWORD: '${DB_PASSWORD}'
          MYSQL_ALLOW_EMPTY_PASSWORD: 1
      volumes:
          - 'prod-mysql:/var/lib/mysql'
      networks:
          - prod-network

  # .NET API Service
  api_dotnet:
    build:
      context: ./Api
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5000:8080"
    networks:
      - prod-network

networks:
  prod-network:
    driver: bridge

volumes:
    prod-mysql:
        driver: local
