# ==============================================================
# docker-compose.dev.yml
# สำหรับ Local Development — Clone แล้วรันได้เลย!
# 
# วิธีใช้:
#   1. git clone <repo-url>
#   2. cp .env.example .env
#   3. docker compose -f docker-compose.dev.yml up --build
#   4. เปิด http://localhost:8000
# ==============================================================

services:
  # Laravel PHP Application (Volume mount สำหรับ hot reload)
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    volumes:
      - '.:/var/www'                    # Mount โค้ดจากเครื่อง → แก้ไฟล์แล้วเห็นผลทันที
    environment:
      APP_ENV: local
      APP_DEBUG: 'true'
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: laravel
      DB_USERNAME: sail
      DB_PASSWORD: password
    depends_on:
      db:
        condition: service_healthy
    networks:
      - dev-network

  # Nginx Web Server
  web:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - '8000:80'                       # เข้าผ่าน http://localhost:8000
    volumes:
      - './docker/nginx/default.conf:/etc/nginx/conf.d/default.conf'
    depends_on:
      - app
    networks:
      - dev-network

  # MySQL Database
  db:
    image: 'mysql:8.4'
    restart: unless-stopped
    ports:
      - '3306:3306'                     # เข้าถึง DB ผ่าน localhost:3306 ได้
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: laravel
      MYSQL_USER: sail
      MYSQL_PASSWORD: password
      MYSQL_ALLOW_EMPTY_PASSWORD: 1
    volumes:
      - 'dev-mysql:/var/lib/mysql'      # เก็บข้อมูล DB ถาวร (ลบ container ข้อมูลไม่หาย)
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-ppassword"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - dev-network

  # .NET API Service
  api_dotnet:
    build:
      context: ./Api
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - '5000:8080'                     # เข้าผ่าน http://localhost:5000
    networks:
      - dev-network

networks:
  dev-network:
    driver: bridge

volumes:
  dev-mysql:
    driver: local
